<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 מוזיקה חרדית</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="header">
    <h1>🎵 מוזיקה חרדית</h1>
    <div class="stats" id="stats"></div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="🔍 חיפוש שיר או אמן..." autocomplete="off">
    </div>
    <div class="filters" id="filters"></div>
  </header>
  <main id="songs-grid" class="songs-grid"></main>
  
  <!-- מודל תמלול -->
  <div id="lyrics-modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2 id="modal-title"></h2>
      <p id="modal-artist" class="modal-artist"></p>
      <div id="modal-lyrics" class="modal-lyrics"></div>
    </div>
  </div>

  <!-- נגן מוזיקה קבוע בתחתית -->
  <div id="player-bar" class="player-bar hidden">
    <div class="player-progress-wrap" id="progress-wrap">
      <div class="player-progress" id="progress-bar"></div>
    </div>
    <div class="player-content">
      <div class="player-info">
        <img id="player-thumb" class="player-thumb" src="" alt="">
        <div class="player-text">
          <div class="player-title" id="player-title">לא מנגן</div>
          <div class="player-artist" id="player-artist"></div>
        </div>
      </div>
      <div class="player-controls">
        <button class="player-btn" id="btn-prev" onclick="playPrev()" title="הקודם">⏮</button>
        <button class="player-btn player-btn-main" id="btn-play" onclick="togglePlay()" title="נגן/עצור">▶</button>
        <button class="player-btn" id="btn-next" onclick="playNext()" title="הבא">⏭</button>
      </div>
      <div class="player-extra">
        <span class="player-time" id="player-time">0:00 / 0:00</span>
        <div class="volume-wrap">
          <button class="player-btn player-btn-sm" id="btn-vol" onclick="toggleMute()" title="השתק">🔊</button>
          <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        </div>
        <button class="player-btn player-btn-sm" id="btn-shuffle" onclick="toggleShuffle()" title="ערבוב">🔀</button>
        <button class="player-btn player-btn-sm" id="btn-repeat" onclick="toggleRepeat()" title="חזרה">🔁</button>
      </div>
    </div>
  </div>

  <!-- YouTube IFrame API - נסתר, משמש רק לאודיו -->
  <div id="yt-player-container" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;">
    <div id="yt-player"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
